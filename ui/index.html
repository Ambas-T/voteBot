<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoteBot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3e;
      --accent:  #6c63ff;
      --green:   #22c55e;
      --red:     #ef4444;
      --yellow:  #f59e0b;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --r:       10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header h1 span { color: var(--accent); }
    #badge {
      margin-left: auto;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    #badge.idle   { background: #1e293b; color: var(--muted); }
    #badge.voting { background: #14291f; color: var(--green); }

    .wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 28px 24px;
      gap: 18px;
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
    }

    /* ── Textarea ── */
    #emailBox {
      width: 100%;
      min-height: 180px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.7;
      padding: 12px 14px;
      resize: vertical;
      outline: none;
      transition: border-color .15s;
    }
    #emailBox:focus       { border-color: var(--accent); }
    #emailBox::placeholder { color: var(--muted); }
    #emailBox:disabled    { opacity: .4; cursor: not-allowed; }

    .email-hint {
      font-size: 12px;
      color: var(--muted);
    }
    .email-hint strong { color: var(--text); font-weight: 600; }

    .email-count {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
    }
    .email-count b { color: var(--accent); }

    /* ── Buttons ── */
    .action-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn {
      padding: 10px 22px;
      border-radius: var(--r);
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      transition: opacity .15s, transform .1s;
    }
    .btn:hover  { opacity: .88; }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }

    .btn-start { background: var(--accent); color: #fff; }
    .btn-stop  { background: var(--red);    color: #fff; }

    /* ── Stats ── */
    .stats {
      display: flex;
      gap: 8px;
    }
    .stat {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .stat .val { font-size: 26px; font-weight: 700; }
    .stat .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
    .stat.s-done .val    { color: var(--muted); }
    .stat.s-success .val { color: var(--green); }
    .stat.s-failed .val  { color: var(--red); }

    .progress-wrap {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      height: 7px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 6px;
      width: 0%;
      transition: width .4s ease;
    }
    .progress-label {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      margin-top: 4px;
    }

    /* ── Log ── */
    .log-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
      min-height: 220px;
    }
    .log-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: #13151f;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .log-header span { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--muted); }
    .log-clear { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; }
    .log-clear:hover { color: var(--text); }
    #logBox {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.65;
    }
    .line { white-space: pre-wrap; word-break: break-all; }
    .line.ok   { color: var(--green); }
    .line.err  { color: var(--red); }
    .line.warn { color: var(--yellow); }
    .line.sep  { color: var(--border); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6c63ff" stroke-width="2">
    <path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
  </svg>
  <h1>Vote<span>Bot</span></h1>
  <div id="badge" class="idle">Idle</div>
</header>

<div class="wrap">

  <!-- ── Emails card ── -->
  <div class="card">
    <div class="card-title">Emails</div>

    <textarea id="emailBox" placeholder="Paste emails here — one per line&#10;&#10;user1@gmail.com&#10;user2@yahoo.com&#10;user3@protonmail.com"></textarea>

    <div style="display:flex;align-items:center;justify-content:space-between">
      <div class="email-hint">One email per line. Paste as many as you need.</div>
      <div class="email-count"><b id="emailCount">0</b> emails</div>
    </div>

    <div class="action-row">
      <button id="btnStart" class="btn btn-start" onclick="startVoting()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Start Voting
      </button>
      <button id="btnStop" class="btn btn-stop" onclick="stopVoting()" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        Stop
      </button>
    </div>
  </div>

  <!-- ── Stats card (hidden until voting starts) ── -->
  <div class="card" id="statsCard" style="display:none">
    <div class="stats">
      <div class="stat s-done">
        <div class="val" id="sDone">0</div>
        <div class="lbl">Done</div>
      </div>
      <div class="stat s-success">
        <div class="val" id="sSuccess">0</div>
        <div class="lbl">Voted</div>
      </div>
      <div class="stat s-failed">
        <div class="val" id="sFailed">0</div>
        <div class="lbl">Failed</div>
      </div>
    </div>
    <div>
      <div class="progress-wrap"><div class="progress-bar" id="pBar"></div></div>
      <div class="progress-label" id="pLabel">0 / 0</div>
    </div>
  </div>

  <!-- ── Live log ── -->
  <div class="log-card">
    <div class="log-header">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      <span>Live Log</span>
      <button class="log-clear" onclick="clearLog()">Clear</button>
    </div>
    <div id="logBox"></div>
  </div>

</div>

<script>
  // ── Email parsing ──────────────────────────────────────────────────────

  function getEmails() {
    return document.getElementById('emailBox').value
      .split(/[\n,;]+/)
      .map(e => e.trim())
      .filter(e => e.includes('@'));
  }

  function updateCount() {
    document.getElementById('emailCount').textContent = getEmails().length;
  }

  document.getElementById('emailBox').addEventListener('input', updateCount);

  // ── SSE ─────────────────────────────────────────────────────────────────

  let sse = null;

  function connectSSE() {
    sse = new EventSource('/api/events');
    sse.onmessage = e => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'log')    addLog(msg.message);
      if (msg.type === 'status') applyStatus(msg.status);
      if (msg.type === 'stats')  applyStats(msg);
    };
    sse.onerror = () => setTimeout(connectSSE, 3000);
  }
  connectSSE();

  // ── Status ───────────────────────────────────────────────────────────────

  function applyStatus(status) {
    const b = document.getElementById('badge');
    b.className = status;
    b.textContent = status === 'voting' ? 'Voting…' : 'Idle';

    const voting = status === 'voting';
    document.getElementById('emailBox').disabled  = voting;
    document.getElementById('btnStart').disabled  = voting;
    document.getElementById('btnStop').disabled   = !voting;
  }

  // ── Stats ────────────────────────────────────────────────────────────────

  function applyStats({ done, total, success, failed }) {
    document.getElementById('statsCard').style.display = 'flex';
    document.getElementById('sDone').textContent    = done    ?? 0;
    document.getElementById('sSuccess').textContent = success ?? 0;
    document.getElementById('sFailed').textContent  = failed  ?? 0;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('pBar').style.width   = pct + '%';
    document.getElementById('pLabel').textContent = `${done ?? 0} / ${total ?? 0}`;
  }

  // ── Log ──────────────────────────────────────────────────────────────────

  function addLog(msg) {
    const box = document.getElementById('logBox');
    const div = document.createElement('div');
    div.className = 'line';
    const m = msg.toLowerCase();
    if (m.includes('✅') || m.includes('voted ✓') || m.includes('logged in ✓') || m.includes('succeeded'))
      div.classList.add('ok');
    else if (m.includes('❌') || m.includes('error') || m.includes('fail') || m.includes('fatal'))
      div.classList.add('err');
    else if (m.includes('[tor]') || m.includes('warn') || m.includes('retrying'))
      div.classList.add('warn');
    else if (msg.startsWith('──') || msg.startsWith('━━') || msg.startsWith('══'))
      div.classList.add('sep');
    div.textContent = msg;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function clearLog() { document.getElementById('logBox').innerHTML = ''; }

  // ── API ──────────────────────────────────────────────────────────────────

  async function api(method, url, body) {
    const res = await fetch(url, {
      method,
      headers: body ? { 'Content-Type': 'application/json' } : {},
      body:    body ? JSON.stringify(body) : undefined,
    });
    return res.json();
  }

  async function startVoting() {
    const emails = getEmails();
    if (emails.length === 0) {
      addLog('⚠  Paste at least one email in the box above');
      return;
    }
    const r = await api('POST', '/api/vote/start', { emails });
    if (!r.ok) addLog('⚠  ' + r.error);
  }

  async function stopVoting() {
    await api('POST', '/api/vote/stop');
  }
</script>
</body>
</html>
